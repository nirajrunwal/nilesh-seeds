name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # FIX 1: Ensure Java 17 is installed. Modern Gradle versions will fail with exit code 1 if Java 11 or 8 is used.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # FIX 2: Give the Gradle wrapper execution permissions. Without this, Linux (GitHub Actions) blocks the build.
      - name: Grant execute permission for gradlew
        run: |
          if [ -f "./gradlew" ]; then chmod +x ./gradlew; fi
          if [ -f "./android/gradlew" ]; then chmod +x ./android/gradlew; fi

      # FIX 3: Run the build with --stacktrace so if it fails again, it tells us EXACTLY which file is missing
      - name: Build Debug APK
        run: |
          if [ -d "android" ]; then
            cd android
            ./gradlew assembleDebug --stacktrace
          else
            ./gradlew assembleDebug --stacktrace
          fi

      # Upload the generated APK so you can download it directly from GitHub
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: '**/*.apk'
