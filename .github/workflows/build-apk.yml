name: Build Android APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore android.keystore -alias nileshseeds -keyalg RSA -keysize 2048 -validity 10000 -storepass "nilesh123" -keypass "nilesh123" -dname "cn=Nilesh Seeds, ou=Agri, o=Nilesh, c=IN"

      - name: Init and Build TWA
        run: |
          bubblewrap init --manifest="https://nilesh-seeds.vercel.app/manifest.json" --directory=./twa-output <<EOF
          nilesh123
          nilesh123
          EOF
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Find and Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nilesh-seeds-apk
          path: |
            ./twa-output/*.apk
            ./*.apk
            ./twa-output/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
